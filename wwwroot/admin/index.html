<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - BuyNext</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <!-- Global Loader -->
    <div id="global-loader" class="loader-overlay" style="display: none;">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <div class="admin-wrapper">
        <!-- Sidebar -->
        <aside id="sidebar" class="admin-sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="bi bi-lightning-fill text-primary"></i>
                    <span>BuyNext <span>Admin</span></span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="#dashboard" class="nav-link active" data-page="dashboard">
                            <i class="bi bi-speedometer2"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>

                    <li class="nav-item accordion">
                        <div class="nav-link accordion-toggle" data-id="products">
                            <i class="bi bi-box-seam"></i>
                            <span>Products</span>
                            <i class="bi bi-chevron-down ms-auto arrow"></i>
                        </div>
                        <ul class="nav-submenu" id="submenu-products">
                            <li><a href="#add-product" class="sub-link" data-page="add-product">Add Product</a></li>
                            <li><a href="#view-products" class="sub-link" data-page="view-products">View Products</a></li>
                            <li><a href="#categories" class="sub-link" data-page="categories">Categories</a></li>
                        </ul>
                    </li>

                    <li class="nav-item">
                        <a href="#users" class="nav-link" data-page="users">
                            <i class="bi bi-people"></i>
                            <span>Users</span>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a href="#orders" class="nav-link" data-page="orders">
                            <i class="bi bi-cart-check"></i>
                            <span>Orders</span>
                        </a>
                    </li>

                    <li class="nav-item accordion">
                        <div class="nav-link accordion-toggle" data-id="import-export">
                            <i class="bi bi-arrow-left-right"></i>
                            <span>Import / Export</span>
                            <i class="bi bi-chevron-down ms-auto arrow"></i>
                        </div>
                        <ul class="nav-submenu" id="submenu-import-export">
                            <li><a href="#import-products" class="sub-link" data-page="import-products">Upload Products</a></li>
                            <li><a href="#import-users" class="sub-link" data-page="import-users">Upload Users</a></li>
                            <li><a href="#export-data" class="sub-link" data-page="export-data">Download Data</a></li>
                        </ul>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <button id="logoutBtn" class="btn btn-outline-danger w-100 rounded-pill">
                    <i class="bi bi-box-arrow-right me-2"></i>Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <header class="main-header shadow-sm">
                <div class="d-flex align-items-center">
                    <button id="sidebarToggle" class="btn btn-link text-dark me-3">
                        <i class="bi bi-list fs-4"></i>
                    </button>
                    <h4 id="pageTitle" class="mb-0 fw-bold">Dashboard</h4>
                </div>
                <div class="user-profile d-flex align-items-center gap-3">
                    <span id="adminName" class="fw-semibold">Admin</span>
                    <div class="avatar bg-primary text-white rounded-circle">A</div>
                </div>
            </header>

            <div id="contentArea" class="p-4">
                <!-- Page content will be loaded here -->
            </div>
        </main>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body"></div>
                <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/products.js"></script>
    <script src="js/users.js"></script>
    <script src="js/orders.js"></script>
    <script src="js/import-export.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
